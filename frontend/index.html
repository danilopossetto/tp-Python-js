<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo de Libros</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen">

  <header class="border-b border-slate-900 sticky top-0 bg-slate-950/80 backdrop-blur-md z-50">
    <div class="max-w-7xl mx-auto px-4 h-16 flex justify-between items-center">
      <div class="flex items-center gap-2">
        <span class="text-xl font-black tracking-wider text-transparent bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text">VAULT</span>
        <span class="text-xs bg-slate-900 text-cyan-400 px-2 py-0.5 rounded-full font-mono border border-cyan-500/10">v1.0</span>
      </div>
      <nav class="flex gap-6 text-sm font-medium">
        <button id="nav-search-btn" class="text-cyan-400 border-b-2 border-cyan-400 pb-1 transition-all">Explorar</button>
        <button id="nav-profile-btn" class="text-slate-400 hover:text-slate-200 pb-1 transition-all">Mi Perfil</button>
      </nav>
    </div>
  </header>

  <div class="max-w-7xl mx-auto px-4 py-8">

    <div id="search-section" class="block">
      
      <div class="max-w-xl mx-auto mb-12 bg-slate-900/40 border border-slate-800 p-6 rounded-xl">
        <h3 id="form-title" class="text-lg font-bold text-cyan-400 mb-4">Agregar Nuevo Libro</h3>
        <form id="libro-form" class="space-y-3 text-sm">
          
          <input type="hidden" id="libro-id">
          
          <input type="text" id="input-titulo" placeholder="Título" required class="w-full bg-slate-950 border border-slate-800 px-3 py-2 rounded focus:outline-none focus:border-cyan-500">
          <input type="text" id="input-autor" placeholder="Autor" required class="w-full bg-slate-950 border border-slate-800 px-3 py-2 rounded focus:outline-none focus:border-cyan-500">
          <input type="number" id="input-paginas" placeholder="Páginas" required min="1" class="w-full bg-slate-950 border border-slate-800 px-3 py-2 rounded focus:outline-none focus:border-cyan-500">
          <input type="url" id="input-cover" placeholder="URL de la Portada (Imagen)" required class="w-full bg-slate-950 border border-slate-800 px-3 py-2 rounded focus:outline-none focus:border-cyan-500">
          
          <div class="flex gap-2 pt-2">
            <button type="submit" id="submit-btn" class="bg-cyan-500 hover:bg-cyan-400 text-slate-950 font-bold px-4 py-2 rounded transition-colors w-full">Guardar Libro</button>
            <button type="button" id="cancel-btn" class="bg-slate-800 hover:bg-slate-700 text-white px-4 py-2 rounded transition-colors hidden">Cancelar</button>
          </div>
        </form>
      </div>

      <div class="max-w-md mx-auto mb-8">
        <div class="relative">
          <input type="text" id="search-input" placeholder="Buscar por título o autor..." class="w-full bg-slate-900/60 border border-slate-800 rounded-xl pl-4 pr-10 py-3 text-sm focus:outline-none focus:border-cyan-500 transition-colors">
          <span class="absolute right-4 top-3.5 text-slate-500 text-xs font-mono">⚡</span>
        </div>
      </div>

    </div>

    <div id="profile-section" class="hidden mb-8">
      <div class="p-6 bg-slate-900/40 backdrop-blur-md border border-slate-800 rounded-xl">
        <h1 class="text-2xl font-bold text-transparent bg-gradient-to-r from-cyan-400 to-indigo-400 bg-clip-text">
          Colección de Favoritos
        </h1>
        <p id="profile-count" class="text-slate-400 font-mono mt-1 text-xs">
          Cargando favoritos...
        </p>
      </div>
    </div>

    <hr class="border-slate-900 my-4">

    <main id="gallery" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-6">
      </main>

  </div>

  <script src="app.js"></script>
</body>
</html>
